<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Foody Recommend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .category-icon {
            width: 60px; height: 60px;
            background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 0 auto 10px; transition: transform 0.2s;
            color: #ee4d2d; font-size: 24px;
        }
        .category-item:hover .category-icon { transform: translateY(-5px); background: #ee4d2d; color: #fff; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: all 0.3s; }
        .card-img-top { height: 160px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="home.html">FOODY RECOMMEND</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="restaurants.html">Danh sách nhà hàng</a></li>
                    <li class="nav-item">
                        <span class="nav-link text-muted">Xin chào, <b id="username">User</b></span>
                    </li>
                    <li class="nav-item"><a href="#" id="logoutBtn" class="nav-link">Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <h1 class="display-4 fw-bold mb-3">Hôm nay bạn muốn ăn gì?</h1>
        <p class="fs-5 mb-4">Khám phá hàng ngàn địa điểm ăn uống & nhận gợi ý phù hợp nhất</p>
        <div class="bg-white p-2 rounded-pill shadow w-50 d-flex">
            <input type="text" id="searchInput" class="form-control border-0 rounded-pill px-4" placeholder="Nhập tên món ăn, nhà hàng...">
            <button id="searchBtn" class="btn btn-danger rounded-pill px-4 fw-bold">TÌM KIẾM</button>
        </div>
    </section>

    <div class="container my-5">
        <h4 class="fw-bold mb-4 border-start border-4 border-danger ps-3">Danh mục phổ biến</h4>
        <div class="row text-center" id="categoriesContainer">
            <!-- Các danh mục sẽ được load từ JavaScript -->
        </div>
    </div>

    <div class="container mb-5">
        <h4 class="fw-bold mb-4 border-start border-4 border-danger ps-3">Địa điểm nổi bật hôm nay</h4>
        <div class="row row-cols-1 row-cols-md-4 g-4" id="restaurantsContainer">
            <!-- Danh sách nhà hàng sẽ được load từ API -->
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-0">© 2026 Đồ án Hệ thống Gợi ý Món ăn</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mock data - dữ liệu giả
        const mockRestaurants = [
            {
                id: 1,
                name: 'Phở Gia Truyền Bát Đàn',
                category: 'Phở',
                description: 'Nước dùng ngọt thanh đặc trưng, thịt bò tái mềm tươi ngon. Quán phở lâu đời chuẩn vị Hà Nội xưa, không gian hoài cổ...',
                address: '49 Bát Đàn, Hoàn Kiếm, Hà Nội',
                priceAverage: '40k - 60k',
                imageUrl: 'https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60'
            },
            {
                id: 2,
                name: 'Cơm Tấm Sài Gòn',
                category: 'Cơm',
                description: 'Cơm tấm chất lượng cao, topping đa dạng và thơm ngon. Quán ăn gia đình, phục vụ tận tâm...',
                address: 'Quận 1, TP.HCM',
                priceAverage: '35k - 50k',
                imageUrl: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60'
            },
            {
                id: 3,
                name: 'Buffet Lẩu Nướng BBQ',
                category: 'Lẩu',
                description: 'Buffet tự chọn với menu đa dạng, thịt tươi ngon, dịch vụ chuyên nghiệp...',
                address: 'Cầu Giấy, Hà Nội',
                priceAverage: '199k - 299k',
                imageUrl: 'https://images.unsplash.com/photo-1544025162-d76690b68603?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60'
            },
            {
                id: 4,
                name: 'Highlands Coffee',
                category: 'Đồ uống',
                description: 'Cà phê chất lượng cao, không gian thoải mái, thích hợp làm việc hay gặp bạn bè...',
                address: 'Đống Đa, Hà Nội',
                priceAverage: '29k - 65k',
                imageUrl: 'https://images.unsplash.com/photo-1600093463592-8e36ae95ef56?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60'
            },
            {
                id: 5,
                name: 'Bún Bò Huế O Xuân',
                category: 'Bún',
                description: 'Bún bò Huế authentic, nước dùng đậm đà, topping đủ loại...',
                address: 'Quang Trung, Hoàn Kiếm',
                priceAverage: '45k - 65k',
                imageUrl: 'https://images.unsplash.com/photo-1519624213695-a682885973c7?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60'
            },
            {
                id: 6,
                name: 'Phở 10 Lý Quốc Sư',
                category: 'Phở',
                description: 'Phở truyền thống Hà Nội, thịt bò tái tươi ngon, nước dùng đặc trưng...',
                address: '10 Lý Quốc Sư, Hoàn Kiếm',
                priceAverage: '40k - 55k',
                imageUrl: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60'
            }
        ];

        // Kiểm tra đăng nhập
        document.addEventListener('DOMContentLoaded', function() {
            const username = localStorage.getItem('username');
            const userId = localStorage.getItem('userId');

            if (!username || !userId) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('username').textContent = username;

            // Load danh sách nhà hàng từ mock data
            loadRestaurants();
            loadCategories();

            // Xử lý đăng xuất
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.clear();
                window.location.href = 'login.html';
            });

            // Xử lý tìm kiếm
            document.getElementById('searchBtn').addEventListener('click', function() {
                const searchTerm = document.getElementById('searchInput').value;
                if (searchTerm) {
                    searchRestaurants(searchTerm);
                }
            });
        });

        function loadRestaurants() {
            const container = document.getElementById('restaurantsContainer');
            container.innerHTML = '';

            if (mockRestaurants.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">Không có nhà hàng nào</p>';
                return;
            }

            mockRestaurants.forEach(restaurant => {
                const restaurantCard = `
                    <div class="col">
                        <a href="index.html?id=${restaurant.id}" class="text-decoration-none text-dark">
                            <div class="card h-100 border-0 shadow-sm">
                                <img src="${restaurant.imageUrl}" class="card-img-top" alt="${restaurant.name}">
                                <div class="card-body">
                                    <h6 class="card-title fw-bold">${restaurant.name}</h6>
                                    <p class="small text-muted mb-1">📍 ${restaurant.address}</p>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="badge bg-info text-dark">${restaurant.category}</span>
                                        <span class="text-danger fw-bold small">${restaurant.priceAverage}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
                container.innerHTML += restaurantCard;
            });
        }

        function loadCategories() {
            const categories = [
                { name: 'Cơm', icon: 'fas fa-utensils' },
                { name: 'Phở / Bún', icon: 'fas fa-bowl-food' },
                { name: 'Đồ uống', icon: 'fas fa-coffee' },
                { name: 'Ăn vặt', icon: 'fas fa-pizza-slice' },
                { name: 'Chay', icon: 'fas fa-leaf' },
                { name: 'Bánh mỳ', icon: 'fas fa-bread-slice' }
            ];

            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            categories.forEach(category => {
                const categoryItem = `
                    <div class="col-6 col-md-2 category-item cursor-pointer">
                        <div class="category-icon"><i class="${category.icon}"></i></div>
                        <h6>${category.name}</h6>
                    </div>
                `;
                container.innerHTML += categoryItem;
            });
        }

        function searchRestaurants(term) {
            const container = document.getElementById('restaurantsContainer');
            const results = mockRestaurants.filter(r =>
                r.name.toLowerCase().includes(term.toLowerCase()) ||
                r.category.toLowerCase().includes(term.toLowerCase()) ||
                r.address.toLowerCase().includes(term.toLowerCase())
            );

            container.innerHTML = '';

            if (results.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">Không tìm thấy kết quả</p>';
                return;
            }

            results.forEach(restaurant => {
                const restaurantCard = `
                    <div class="col">
                        <a href="index.html?id=${restaurant.id}" class="text-decoration-none text-dark">
                            <div class="card h-100 border-0 shadow-sm">
                                <img src="${restaurant.imageUrl}" class="card-img-top" alt="${restaurant.name}">
                                <div class="card-body">
                                    <h6 class="card-title fw-bold">${restaurant.name}</h6>
                                    <p class="small text-muted mb-1">📍 ${restaurant.address}</p>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="badge bg-info text-dark">${restaurant.category}</span>
                                        <span class="text-danger fw-bold small">${restaurant.priceAverage}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
                container.innerHTML += restaurantCard;
            });
        }
    </script>

</body>
</html>
