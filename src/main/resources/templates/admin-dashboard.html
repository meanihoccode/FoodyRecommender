<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Foody Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ee4d2d; /* Cam ShopeeFood/Foody - Giữ nguyên tone cũ */
            --primary-dark: #d73a1e;
            --sidebar-width: 280px;
            --bg-light: #f8f9fa; /* Màu nền xám cực nhạt, sang trọng */
            --text-dark: #2b2b2b;
            --text-muted: #6c757d;
            --border-color: rgba(0,0,0,0.08);
            --card-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- SIDEBAR TRÁI (STYLE SÁNG, SANG TRỌNG) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white; /* Đổi sang nền trắng */
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 15px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sidebar-menu {
            padding: 20px 15px;
            list-style: none;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Tạo khoảng cách đều giữa các menu */
        }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.05rem;
            font-weight: 500;
            border-radius: 12px; /* Bo góc mềm mại giống Form Login */
        }

        .sidebar-menu li a:hover {
            background-color: rgba(238, 77, 45, 0.05);
            color: var(--primary-color);
            transform: translateX(5px);
        }

        .sidebar-menu li.active a {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(238, 77, 45, 0.2);
        }

        .sidebar-menu li a i {
            width: 35px;
            font-size: 1.2rem;
        }

        /* Nút đăng xuất làm khác biệt */
        .sidebar-menu li.logout-item {
            margin-top: auto; /* Đẩy xuống cuối nếu sidebar dài */
        }
        .sidebar-menu li.logout-item a {
            color: #dc3545;
            background-color: rgba(220, 53, 69, 0.05);
        }
        .sidebar-menu li.logout-item a:hover {
            background-color: #dc3545;
            color: white;
            transform: none;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.2);
        }

        /* --- NỘI DUNG CHÍNH (BÊN PHẢI) --- */
        .main-content {
            margin-left: var(--sidebar-width);
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar trên cùng */
        .top-navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .top-navbar .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 30px;
            transition: background 0.2s;
        }

        .top-navbar .user-profile:hover {
            background: var(--bg-light);
        }

        .user-profile img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Khu vực Dashboard (Các thẻ thống kê) */
        .content-wrapper {
            padding: 30px;
            flex: 1;
        }

        .stat-card {
            background: white;
            border-radius: 16px; /* Bo góc to hơn */
            padding: 24px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Vệt màu trang trí bên trên thẻ thay vì bên trái */
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-color);
            opacity: 0.8;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .stat-card .info h3 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .stat-card .info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .stat-card .icon-box {
            width: 65px;
            height: 65px;
            background: rgba(238, 77, 45, 0.1);
            color: var(--primary-color);
            border-radius: 50%; /* Tròn xoe cho mềm mại */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        /* Bảng dữ liệu */
        .table-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }

        .table-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .table-card-header h5 {
            color: var(--text-dark);
        }

        /* Custom Table Bootstrap */
        .table {
            color: var(--text-dark);
        }

        .table > :not(caption) > * > * {
            padding: 1rem 0.5rem;
            border-bottom-color: var(--border-color);
        }

        .table-light {
            --bs-table-bg: #f8f9fa;
            --bs-table-color: var(--text-muted);
        }

        .table-light th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color) !important;
        }

        .badge {
            padding: 0.5em 0.8em;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                box-shadow: none;
            }
            .main-content {
                margin-left: 0;
            }
            .sidebar.active {
                transform: translateX(0);
                box-shadow: 5px 0 25px rgba(0,0,0,0.1);
            }
        }
    </style>
</head>
<body>

<nav class="sidebar d-flex flex-column" id="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-utensils"></i> FOODY ADMIN
    </div>

    <ul class="sidebar-menu flex-grow-1 d-flex flex-column pb-4 mb-0">
        <li class="active">
            <a href="/admin-dashboard"><i class="fas fa-tachometer-alt"></i> Tổng quan</a>
        </li>
        <li>
            <a href="#manage-users"><i class="fas fa-users"></i> Người dùng</a>
        </li>
        <li>
            <a href="#manage-restaurants"><i class="fas fa-store"></i> Nhà hàng</a>
        </li>
        <li>
            <a href="/manage-reservations"><i class="fas fa-calendar-check"></i> Đặt bàn</a>
        </li>
        <li>
            <a href="#system-settings"><i class="fas fa-cog"></i> Cài đặt</a>
        </li>

        <li class="mt-auto logout-item">
            <a href="#" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </li>
    </ul>
</nav>

<div class="main-content" id="main-content">

    <header class="top-navbar">
        <div class="d-flex align-items-center">
            <button class="btn btn-light d-lg-none me-3" id="sidebarToggle" style="border: 1px solid var(--border-color);">
                <i class="fas fa-bars text-dark"></i>
            </button>
            <h4 class="mb-0 fw-bold" style="color: var(--text-dark);">Bảng điều khiển</h4>
        </div>

        <div class="user-profile dropdown">
            <span id="adminName" class="d-none d-sm-inline">Đang tải...</span>
            <img src="https://ui-avatars.com/api/?name=Admin&background=ee4d2d&color=fff" alt="Admin Avatar" id="adminAvatar">
        </div>
    </header>

    <div class="content-wrapper">

        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <div class="stat-card">
                    <div class="info">
                        <h3 id="totalUsers">0</h3>
                        <p>Tổng Người dùng</p>
                    </div>
                    <div class="icon-box"><i class="fas fa-users"></i></div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="stat-card" style="--primary-color: #0dcaf0;">
                    <div class="info">
                        <h3 id="totalRestaurants">0</h3>
                        <p>Nhà hàng</p>
                    </div>
                    <div class="icon-box" style="background: rgba(13, 202, 240, 0.1); color: #0dcaf0;"><i class="fas fa-store"></i></div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="stat-card" style="--primary-color: #198754;">
                    <div class="info">
                        <h3 id="totalReservations">0</h3>
                        <p>Đơn đặt bàn</p>
                    </div>
                    <div class="icon-box" style="background: rgba(25, 135, 84, 0.1); color: #198754;"><i class="fas fa-calendar-check"></i></div>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-card-header">
                <h5 class="mb-0 fw-bold"><i class="fas fa-user-clock me-2" style="color: var(--primary-color);"></i>Người dùng mới đăng ký</h5>
                <button class="btn btn-sm btn-outline-secondary" style="border-radius: 8px;">Xem tất cả <i class="fas fa-arrow-right ms-1"></i></button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 5%">ID</th>
                        <th style="width: 25%">Họ và Tên</th>
                        <th style="width: 25%">Email</th>
                        <th style="width: 15%">Số điện thoại</th>
                        <th style="width: 15%">Xác thực</th>
                        <th style="width: 15%">Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody">
                    <tr>
                        <td colspan="6" class="text-center text-muted py-5">
                            <div class="spinner-border spinner-border-sm me-2 text-primary" role="status"></div>
                            Đang tải dữ liệu...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin-dashboard.js"></script>

</body>
</html>
