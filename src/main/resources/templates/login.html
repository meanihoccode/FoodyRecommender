<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Foody Recommend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 100%),
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-card .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-card .subtitle {
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-floating > label {
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-control {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(238, 77, 45, 0.15);
            background: white;
        }

        .btn-login {
            background-color: var(--primary-color);
            border: none;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            color: white;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(238, 77, 45, 0.3);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            border: none;
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
            padding: 12px 16px;
        }

        .alert-danger {
            background-color: rgba(238, 77, 45, 0.1);
            color: var(--primary-dark);
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .signup-link a:hover {
            color: var(--primary-dark);
            gap: 0.8rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-check {
            margin: 0;
        }

        .form-check-input {
            border: 1px solid var(--border-color);
            width: 18px;
            height: 18px;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.2em;
            display: none;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-card .logo {
                font-size: 2rem;
            }

            .login-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="logo">
                    <i class="fas fa-utensils"></i>
                    FOODY
                </div>
                <p class="subtitle mb-0">
                    <i class="fas fa-heart me-1" style="color: var(--primary-color);"></i>
                    Gợi ý các món ăn ngon
                </p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="form-floating">
                        <input type="email" class="form-control" id="email" placeholder="Email" required>
                        <label for="email">
                            <i class="fas fa-envelope me-2" style="color: var(--primary-color);"></i>
                            Email của bạn
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                        <label for="password">
                            <i class="fas fa-lock me-2" style="color: var(--primary-color);"></i>
                            Mật khẩu
                        </label>
                    </div>
                </div>

                <div id="errorMsg" class="alert alert-danger d-none" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span id="errorText"></span>
                </div>

                <div class="remember-forgot">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Ghi nhớ tôi
                        </label>
                    </div>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-login w-100 mb-2">
                    <i class="fas fa-sign-in-alt me-2"></i>
                    ĐĂNG NHẬP
                    <span class="spinner-border spinner-border-sm ms-2" role="status" aria-hidden="true"></span>
                </button>
            </form>

            <div class="signup-link">
                <p class="text-muted small mb-0">Chưa có tài khoản?</p>
                <a href="/signup">
                    Đăng ký ngay
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="otpModal" tabindex="-1" aria-labelledby="otpModalLabel" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="otpModalLabel" style="color: var(--primary-color);">
                        <i class="fas fa-shield-alt me-2"></i>Xác thực tài khoản
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center pt-2 pb-4 px-4">
                    <p class="text-muted small mb-4">Tài khoản của bạn chưa được kích hoạt. Chúng tôi vừa gửi một mã OTP mới đến <strong id="verifyEmailText" class="text-dark"></strong>.</p>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control text-center fw-bold fs-4 tracking-widest" id="loginOtpCode" placeholder="Nhập 6 số" maxlength="6" autocomplete="off" style="letter-spacing: 0.5rem;">
                        <label for="loginOtpCode" class="text-center w-100">Nhập mã 6 số</label>
                    </div>

                    <div id="otpErrorMsg" class="alert alert-danger d-none small text-start py-2" role="alert"></div>
                    <div id="otpSuccessMsg" class="alert alert-success d-none small text-start py-2" role="alert"></div>

                    <button type="button" id="btnVerifyLoginOtp" class="btn btn-primary w-100 mb-3" style="background-color: var(--primary-color); border: none; padding: 12px; font-weight: bold;">
                        XÁC NHẬN & ĐĂNG NHẬP
                    </button>

                    <div class="mt-2">
                        <span class="text-muted small">Chưa nhận được mã? </span>
                        <button type="button" id="loginResendOtpBtn" class="btn btn-link text-decoration-none p-0 fw-bold" style="color: var(--primary-color);">
                            Gửi lại mã (<span id="loginCountdown">90</span>s)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/login.js?v=2"></script>
</body>
</html>
