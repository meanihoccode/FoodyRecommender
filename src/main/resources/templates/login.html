<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Foody Recommend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Hình nền mờ ảo */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 400px;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
        .btn-primary-custom {
            background-color: #ee4d2d;
            border: none;
            padding: 12px;
            font-weight: bold;
        }
        .btn-primary-custom:hover { background-color: #d73211; color: white; }
        .form-control:focus { border-color: #ee4d2d; box-shadow: 0 0 0 0.2rem rgba(238, 77, 45, 0.25); }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h2 class="fw-bold text-danger mb-4">FOODY RECOMMEND</h2>
        <p class="text-muted mb-4">Đăng nhập để nhận gợi ý món ngon!</p>

        <form id="loginForm" action="javascript:void(0)">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
                <label for="email">Email</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                <label for="password">Mật khẩu</label>
            </div>

            <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>

            <button type="button" class="btn btn-primary-custom w-100 mb-3" onclick="handleLogin()">ĐĂNG NHẬP</button>

            <div class="d-flex justify-content-center text-small">
                <a href="signup.html" style="text-align: center;"
                class="d-block text-center text-danger fw-bold mt-3">
                Chưa có tài khoản? Đăng ký ngay
                </a>           
            </div>
        </form>
    </div>

</body>
<script src="/js/login.js"></script>
</html>
